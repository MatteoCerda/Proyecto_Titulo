<form class="grid gap-4 max-w-xl" [formGroup]="form" (ngSubmit)="registrar()">
  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>
    <input matInput placeholder="demo@kingstone.cl" formControlName="email">
    <mat-error *ngIf="f.email?.hasError('required')">Email es requerido</mat-error>
    <mat-error *ngIf="f.email?.hasError('email')">Formato de email inválido</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Nombre</mat-label>
    <input matInput placeholder="Nombre" formControlName="nombre">
    <mat-error *ngIf="f.nombre?.hasError('required')">Nombre es requerido</mat-error>
    <mat-error *ngIf="f.nombre?.hasError('minlength')">Mínimo 2 caracteres</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Password</mat-label>
    <input matInput type="password" placeholder="******" formControlName="password">
    <mat-error *ngIf="f.password?.hasError('required')">Password es requerido</mat-error>
    <mat-error *ngIf="f.password?.hasError('minlength')">Mínimo 6 caracteres</mat-error>
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || loading()">
    {{ loading() ? 'Creando...' : 'Crear usuario' }}
  </button>
</form>

<div class="mt-8">
  <div class="flex items-center gap-2 mb-2">
    <h3 class="text-lg font-semibold">Usuarios</h3>
    <button mat-stroked-button (click)="cargar()">Refrescar</button>
  </div>

  <table mat-table [dataSource]="usuarios" class="mat-elevation-z2 w-full">
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef>ID</th>
      <td mat-cell *matCellDef="let u">{{ u.id }}</td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Creado</th>
      <td mat-cell *matCellDef="let u">{{ u.createdAt | date:'yyyy-MM-dd HH:mm' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <p *ngIf="usuarios?.length === 0" class="mt-3 opacity-70">No hay usuarios aún.</p>
</div>
